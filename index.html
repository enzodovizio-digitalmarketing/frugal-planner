<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frugal Planner 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS ===== */
:root, [data-theme="light"] {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --font-body: 'Inter', sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;

  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f0ede8;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #6b6960;
  --color-text-faint: #aaa9a4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);

  --urgent-color: #c0392b; --urgent-bg: #fdf2f1; --urgent-border: #e8c3bf;
  --inprogress-color: #b7860b; --inprogress-bg: #fefbf0; --inprogress-border: #e8ddb0;
  --fast-color: #27ae60; --fast-bg: #f0fdf5; --fast-border: #b6e8c8;
  --week-color: #2471a3; --week-bg: #f0f6fd; --week-border: #b3d4f0;
  --plan-color: #8e44ad; --plan-bg: #f8f3fd; --plan-border: #d8b8f0;
  --waiting-color: #5d4037; --waiting-bg: #fdf8f5; --waiting-border: #d4bfb0;
}

[data-theme="dark"] {
  --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
  --color-surface-offset: #252421; --color-divider: #2e2d2b; --color-border: #393836;
  --color-text: #cdccca; --color-text-muted: #7a7976; --color-text-faint: #545250;
  --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #1e3b3e;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25); --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35); --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.45);
  --urgent-color: #e57373; --urgent-bg: #2a1a1a; --urgent-border: #5a2d2d;
  --inprogress-color: #f0c040; --inprogress-bg: #252010; --inprogress-border: #5a4a10;
  --fast-color: #66bb6a; --fast-bg: #152218; --fast-border: #245530;
  --week-color: #5b9bd5; --week-bg: #0f1e30; --week-border: #1e4060;
  --plan-color: #ba7fe0; --plan-bg: #1e1030; --plan-border: #4a2560;
  --waiting-color: #a1887f; --waiting-bg: #221815; --waiting-border: #4a3328;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text); background: var(--color-bg); transition: background var(--transition-interactive), color var(--transition-interactive); }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }

.app-shell { display: flex; flex-direction: column; min-height: 100dvh; }

.topbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-6); background: var(--color-surface); border-bottom: 1px solid var(--color-divider); box-shadow: var(--shadow-sm); gap: var(--space-4); }
.topbar-brand { display: flex; align-items: center; gap: var(--space-3); }
.topbar-logo { width: 32px; height: 32px; flex-shrink: 0; }
.topbar-title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 400; letter-spacing: -0.01em; color: var(--color-text); white-space: nowrap; }
.topbar-title span { color: var(--color-primary); }
.topbar-meta { display: flex; align-items: center; gap: var(--space-4); flex: 1; justify-content: center; flex-wrap: wrap; }
.week-selector { display: flex; align-items: center; gap: var(--space-2); }
.week-label { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.week-input { width: 48px; padding: var(--space-1) var(--space-2); border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-bg); font-size: var(--text-sm); font-weight: 600; text-align: center; color: var(--color-text); transition: border-color var(--transition-interactive); }
.week-input:focus { border-color: var(--color-primary); }
.date-range { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--color-text-muted); }
.date-input { padding: var(--space-1) var(--space-2); border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-bg); font-size: var(--text-xs); color: var(--color-text); transition: border-color var(--transition-interactive); }
.date-input:focus { border-color: var(--color-primary); }
.topbar-actions { display: flex; align-items: center; gap: var(--space-2); }
.btn-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); color: var(--color-text-muted); transition: background var(--transition-interactive), color var(--transition-interactive); }
.btn-icon:hover { background: var(--color-surface-offset); color: var(--color-text); }
.btn-primary { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); background: var(--color-primary); color: white; border-radius: var(--radius-md); font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.02em; transition: background var(--transition-interactive); white-space: nowrap; }
.btn-primary:hover { background: var(--color-primary-hover); }

.stats-bar { display: flex; gap: var(--space-4); padding: var(--space-4) var(--space-6); background: var(--color-surface-2); border-bottom: 1px solid var(--color-divider); overflow-x: auto; flex-wrap: wrap; }
.stat-chip { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); background: var(--color-surface); border: 1px solid var(--color-border); font-size: var(--text-xs); white-space: nowrap; box-shadow: var(--shadow-sm); }
.stat-dot { width: 8px; height: 8px; border-radius: var(--radius-full); flex-shrink: 0; }
.stat-label { color: var(--color-text-muted); font-weight: 500; }
.stat-count { font-weight: 700; margin-left: var(--space-1); }
.progress-bar-wrap { flex: 1; min-width: 160px; display: flex; align-items: center; gap: var(--space-3); margin-left: auto; }
.progress-label { font-size: var(--text-xs); color: var(--color-text-muted); white-space: nowrap; }
.progress-track { flex: 1; height: 6px; background: var(--color-surface-offset); border-radius: var(--radius-full); overflow: hidden; }
.progress-fill { height: 100%; background: var(--color-primary); border-radius: var(--radius-full); transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
.progress-pct { font-size: var(--text-xs); font-weight: 700; color: var(--color-primary); min-width: 32px; text-align: right; }

.main { padding: var(--space-6); flex: 1; }
.planner-grid { display: grid; grid-template-columns: repeat(3, 1fr) 200px; grid-template-rows: auto auto; gap: var(--space-4); max-width: 1400px; margin: 0 auto; }

.task-col { background: var(--color-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--color-border); transition: box-shadow var(--transition-interactive); }
.task-col:hover { box-shadow: var(--shadow-md); }
.col-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-4); border-bottom: 1px solid; }
.col-header-left { display: flex; align-items: center; gap: var(--space-2); }
.col-badge { display: inline-flex; align-items: center; padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: white; }
.col-subtitle { display: block; font-size: var(--text-xs); color: var(--color-text-muted); padding: 0 var(--space-4) var(--space-2); font-style: italic; border-bottom: 1px solid var(--color-divider); background: var(--color-surface-2); }
.col-count { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-faint); min-width: 20px; text-align: right; }

.col-urgent .col-header { background: var(--urgent-bg); border-color: var(--urgent-border); }
.col-urgent .col-badge { background: var(--urgent-color); }
.col-urgent .col-subtitle { background: var(--urgent-bg); }
.col-inprogress .col-header { background: var(--inprogress-bg); border-color: var(--inprogress-border); }
.col-inprogress .col-badge { background: var(--inprogress-color); }
.col-inprogress .col-subtitle { background: var(--inprogress-bg); }
.col-fast .col-header { background: var(--fast-bg); border-color: var(--fast-border); }
.col-fast .col-badge { background: var(--fast-color); }
.col-fast .col-subtitle { background: var(--fast-bg); }
.col-week .col-header { background: var(--week-bg); border-color: var(--week-border); }
.col-week .col-badge { background: var(--week-color); }
.col-week .col-subtitle { background: var(--week-bg); }
.col-plan .col-header { background: var(--plan-bg); border-color: var(--plan-border); }
.col-plan .col-badge { background: var(--plan-color); }
.col-plan .col-subtitle { background: var(--plan-bg); }
.col-waiting .col-header { background: var(--waiting-bg); border-color: var(--waiting-border); }
.col-waiting .col-badge { background: var(--waiting-color); }
.col-waiting .col-subtitle { background: var(--waiting-bg); }

.task-list { flex: 1; padding: var(--space-2) 0; }
.task-item { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); border-bottom: 1px solid transparent; transition: background var(--transition-interactive); min-height: 40px; }
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: var(--color-surface-offset); }
.task-num { font-size: var(--text-xs); color: var(--color-text-faint); font-weight: 500; min-width: 16px; text-align: right; flex-shrink: 0; }
.task-input-wrap { flex: 1; position: relative; }
.task-input { width: 100%; background: none; border: none; outline: none; font-size: var(--text-xs); color: var(--color-text); padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); transition: background var(--transition-interactive); }
.task-input::placeholder { color: var(--color-text-faint); }
.task-input:focus { background: var(--color-surface-offset); }
.task-input.done { text-decoration: line-through; color: var(--color-text-faint); }
.task-checkbox { width: 16px; height: 16px; flex-shrink: 0; border: 1.5px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-surface-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-interactive); position: relative; }
.task-checkbox:hover { border-color: var(--color-primary); }
.task-checkbox.checked { background: var(--color-primary); border-color: var(--color-primary); }
.task-checkbox.checked::after { content: ''; position: absolute; width: 9px; height: 5px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translateY(-1px); }
.task-delete { width: 20px; height: 20px; flex-shrink: 0; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--color-text-faint); opacity: 0; transition: opacity var(--transition-interactive), color var(--transition-interactive); font-size: 14px; }
.task-item:hover .task-delete { opacity: 1; }
.task-delete:hover { color: #c0392b; }

.add-task-row { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); border-top: 1px solid var(--color-divider); }
.add-task-btn { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs); color: var(--color-text-faint); padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); width: 100%; transition: color var(--transition-interactive), background var(--transition-interactive); }
.add-task-btn:hover { color: var(--color-primary); background: var(--color-surface-offset); }

.col-note { grid-row: 1 / 3; background: var(--color-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--color-border); }
.col-note .col-header { background: var(--color-surface-offset); border-color: var(--color-divider); }
.col-note .col-badge { background: var(--color-text-muted); }
.note-area { flex: 1; padding: var(--space-4); resize: none; width: 100%; background: none; border: none; outline: none; font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text); line-height: 1.7; }
.note-area::placeholder { color: var(--color-text-faint); }

.modal-overlay { position: fixed; inset: 0; background: oklch(0.1 0 0 / 0.6); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition-interactive); }
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal { background: var(--color-surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: var(--space-8); width: min(480px, 90vw); transform: translateY(12px) scale(0.97); transition: transform var(--transition-interactive); border: 1px solid var(--color-border); }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-title { font-family: var(--font-display); font-size: var(--text-lg); margin-bottom: var(--space-6); }
.modal-field { margin-bottom: var(--space-4); }
.modal-label { display: block; font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); margin-bottom: var(--space-2); text-transform: uppercase; letter-spacing: 0.05em; }
.modal-input, .modal-select { width: 100%; padding: var(--space-3) var(--space-4); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface-2); font-size: var(--text-sm); color: var(--color-text); transition: border-color var(--transition-interactive); }
.modal-input:focus, .modal-select:focus { outline: none; border-color: var(--color-primary); }
.modal-actions { display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-6); }
.btn-ghost { padding: var(--space-2) var(--space-4); font-size: var(--text-sm); border-radius: var(--radius-md); color: var(--color-text-muted); transition: background var(--transition-interactive), color var(--transition-interactive); }
.btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }

.toast-container { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: 300; display: flex; flex-direction: column; gap: var(--space-2); }
.toast { background: var(--color-text); color: var(--color-bg); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); font-size: var(--text-xs); font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

@media (max-width: 1100px) { .planner-grid { grid-template-columns: repeat(2, 1fr) 180px; grid-template-rows: auto auto auto; } .col-note { grid-row: 1 / 4; } }
@media (max-width: 768px) { .planner-grid { grid-template-columns: 1fr; grid-template-rows: unset; } .col-note { grid-row: auto; } .topbar-meta { display: none; } .main { padding: var(--space-4); } .stats-bar { padding: var(--space-3) var(--space-4); } }
.sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0; }
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="topbar-brand">
      <svg class="topbar-logo" viewBox="0 0 32 32" fill="none" aria-label="Frugal Planner logo">
        <rect x="2" y="2" width="28" height="28" rx="6" fill="var(--color-primary)" opacity="0.15"/>
        <rect x="5" y="8" width="14" height="2.5" rx="1.25" fill="var(--color-primary)"/>
        <rect x="5" y="13" width="10" height="2" rx="1" fill="var(--color-primary)" opacity="0.7"/>
        <rect x="5" y="18" width="12" height="2" rx="1" fill="var(--color-primary)" opacity="0.5"/>
        <circle cx="24" cy="22" r="6" fill="var(--color-primary)"/>
        <path d="M21.5 22l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="topbar-title">Frugal <span>Planner</span> <span style="font-family:var(--font-body);font-size:var(--text-xs);color:var(--color-text-muted);font-weight:600;">2026</span></span>
    </div>
    <div class="topbar-meta">
      <div class="week-selector">
        <span class="week-label">Week</span>
        <input class="week-input" type="number" id="weekNum" min="1" max="53" value="17" aria-label="Numero settimana">
      </div>
      <div class="date-range">
        <span style="font-size:var(--text-xs);color:var(--color-text-faint);">Dal</span>
        <input class="date-input" type="date" id="dateFrom" aria-label="Data inizio">
        <span style="font-size:var(--text-xs);color:var(--color-text-faint);">Al</span>
        <input class="date-input" type="date" id="dateTo" aria-label="Data fine">
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Nuovo Task
      </button>
      <button class="btn-icon" data-theme-toggle aria-label="Cambia tema">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="btn-icon" onclick="clearCompleted()" title="Rimuovi completati" aria-label="Rimuovi task completati">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
      <button class="btn-icon" onclick="exportData()" title="Esporta JSON" aria-label="Esporta dati">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <main class="main">
    <div class="planner-grid" id="plannerGrid"></div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">Aggiungi Task</h2>
    <div class="modal-field">
      <label class="modal-label" for="modalCategory">Categoria</label>
      <select class="modal-select" id="modalCategory">
        <option value="urgent">🔴 Urgent Task</option>
        <option value="inprogress">🟡 Task in Progress</option>
        <option value="fast">🟢 Fast Task</option>
        <option value="week">🔵 Week Task</option>
        <option value="plan">🟣 Plan Task</option>
        <option value="waiting">🟤 Waiting Task</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label" for="modalText">Descrizione Task</label>
      <input class="modal-input" type="text" id="modalText" placeholder="Inserisci il task..." autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Annulla</button>
      <button class="btn-primary" onclick="confirmModal()">Aggiungi</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script>
const COLS = [
  { id: 'urgent',     label: 'Urgent Task',     subtitle: 'Scadenza oggi / fare subito' },
  { id: 'inprogress', label: 'Task in Progress', subtitle: 'Alta priorità e importanza max 2-3 gg' },
  { id: 'fast',       label: 'Fast Task',        subtitle: 'Da fare in meno di 2h o al max 30 min' },
  { id: 'week',       label: 'Week Task',        subtitle: 'Da completare in 5-7 gg' },
  { id: 'plan',       label: 'Plan Task',        subtitle: 'Pianificate, da completare nel mese' },
  { id: 'waiting',    label: 'Waiting Task',     subtitle: 'In attesa, sospesi, fermi, con problemi' },
];

let state = {
  notes: '',
  tasks: {
    urgent: Array(10).fill(null).map((_,i) => ({ id: `u${i}`, text: '', done: false })),
    inprogress: Array(10).fill(null).map((_,i) => ({ id: `p${i}`, text: '', done: false })),
    fast: Array(10).fill(null).map((_,i) => ({ id: `f${i}`, text: '', done: false })),
    week: Array(10).fill(null).map((_,i) => ({ id: `w${i}`, text: '', done: false })),
    plan: Array(10).fill(null).map((_,i) => ({ id: `pl${i}`, text: '', done: false })),
    waiting: Array(10).fill(null).map((_,i) => ({ id: `wt${i}`, text: '', done: false })),
  }
};

function init() {
  const today = new Date();
  const dayOfWeek = today.getDay() || 7;
  const monday = new Date(today); monday.setDate(today.getDate() - dayOfWeek + 1);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  document.getElementById('dateFrom').value = monday.toISOString().split('T')[0];
  document.getElementById('dateTo').value = sunday.toISOString().split('T')[0];
  const date = new Date(Date.UTC(today.getFullYear(), today.getMonth(), today.getDate()));
  const dayNum = date.getUTCDay() || 7; date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  document.getElementById('weekNum').value = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  renderGrid(); renderStats();
  document.getElementById('weekNum').addEventListener('change', () => {});
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('modalText').addEventListener('keydown', e => { if (e.key === 'Enter') confirmModal(); });
}

function renderGrid() {
  const grid = document.getElementById('plannerGrid');
  grid.innerHTML = '';
  COLS.forEach(col => grid.appendChild(createColEl(col)));
  const noteCol = document.createElement('div');
  noteCol.className = 'task-col col-note';
  noteCol.innerHTML = `<div class="col-header"><div class="col-header-left"><span class="col-badge">NOTE</span></div></div><textarea class="note-area" id="noteArea" placeholder="Appunti, note libere per questa settimana...">${state.notes}</textarea>`;
  grid.appendChild(noteCol);
  document.getElementById('noteArea').addEventListener('input', e => { state.notes = e.target.value; });
}

function createColEl(col) {
  const wrapper = document.createElement('div');
  wrapper.className = `task-col col-${col.id}`;
  wrapper.id = `col-${col.id}`;
  const tasks = state.tasks[col.id];
  const doneCount = tasks.filter(t => t.done && t.text).length;
  const totalFilled = tasks.filter(t => t.text).length;
  wrapper.innerHTML = `
    <div class="col-header"><div class="col-header-left"><span class="col-badge">${col.label}</span></div><span class="col-count">${doneCount}/${totalFilled}</span></div>
    <span class="col-subtitle">${col.subtitle}</span>
    <div class="task-list" id="list-${col.id}">${tasks.map((t,i) => renderTaskItem(col.id, t, i)).join('')}</div>
    <div class="add-task-row"><button class="add-task-btn" onclick="addTaskSlot('${col.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Aggiungi task</button></div>`;
  return wrapper;
}

function renderTaskItem(colId, task, index) {
  return `<div class="task-item" id="item-${task.id}">
    <span class="task-num">${index + 1}</span>
    <div class="task-input-wrap"><input class="task-input${task.done?' done':''}" type="text" value="${esc(task.text)}" placeholder="Task ${index+1}..." data-col="${colId}" data-id="${task.id}" onchange="updateTaskText('${colId}','${task.id}',this.value)" onkeydown="handleTaskKeydown(event,'${colId}','${task.id}')" aria-label="Task ${index+1}"></div>
    <div class="task-checkbox${task.done?' checked':''}" onclick="toggleTask('${colId}','${task.id}')" role="checkbox" aria-checked="${task.done}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')toggleTask('${colId}','${task.id}')"></div>
    <button class="task-delete" onclick="deleteTask('${colId}','${task.id}')" aria-label="Elimina task">&times;</button>
  </div>`;
}

function esc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function updateTaskText(colId, taskId, value) {
  const task = state.tasks[colId].find(t => t.id === taskId);
  if (task) task.text = value;
  refreshColHeader(colId); renderStats();
}

function toggleTask(colId, taskId) {
  const task = state.tasks[colId].find(t => t.id === taskId);
  if (!task) return;
  task.done = !task.done;
  const item = document.getElementById(`item-${taskId}`);
  if (item) {
    item.querySelector('.task-checkbox').classList.toggle('checked', task.done);
    item.querySelector('.task-checkbox').setAttribute('aria-checked', task.done);
    item.querySelector('.task-input').classList.toggle('done', task.done);
  }
  refreshColHeader(colId); renderStats();
  if (task.done && task.text) showToast('✓ Task completato');
}

function deleteTask(colId, taskId) {
  const idx = state.tasks[colId].findIndex(t => t.id === taskId);
  if (idx !== -1) state.tasks[colId].splice(idx, 1);
  refreshCol(colId); renderStats();
}

function addTaskSlot(colId) {
  state.tasks[colId].push({ id: colId + '_' + Date.now(), text: '', done: false });
  refreshCol(colId);
  setTimeout(() => {
    const inputs = document.querySelectorAll(`#list-${colId} .task-input`);
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function handleTaskKeydown(e, colId, taskId) { if (e.key === 'Enter') { e.preventDefault(); addTaskSlot(colId); } }

function refreshCol(colId) {
  const col = COLS.find(c => c.id === colId);
  const wrapper = document.getElementById(`col-${colId}`);
  if (col && wrapper) wrapper.replaceWith(createColEl(col));
}

function refreshColHeader(colId) {
  const tasks = state.tasks[colId];
  const el = document.querySelector(`#col-${colId} .col-count`);
  if (el) el.textContent = `${tasks.filter(t=>t.done&&t.text).length}/${tasks.filter(t=>t.text).length}`;
}

function renderStats() {
  const colors = { urgent:'var(--urgent-color)',inprogress:'var(--inprogress-color)',fast:'var(--fast-color)',week:'var(--week-color)',plan:'var(--plan-color)',waiting:'var(--waiting-color)' };
  const labels = { urgent:'Urgent',inprogress:'In Progress',fast:'Fast',week:'Week',plan:'Plan',waiting:'Waiting' };
  let total = 0, done = 0, chips = '';
  COLS.forEach(col => {
    const filled = state.tasks[col.id].filter(t => t.text);
    const d = filled.filter(t => t.done);
    total += filled.length; done += d.length;
    chips += `<div class="stat-chip"><span class="stat-dot" style="background:${colors[col.id]}"></span><span class="stat-label">${labels[col.id]}</span><span class="stat-count" style="color:${colors[col.id]}">${d.length}/${filled.length}</span></div>`;
  });
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  chips += `<div class="progress-bar-wrap"><span class="progress-label">Completamento settimanale</span><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-pct">${pct}%</span></div>`;
  document.getElementById('statsBar').innerHTML = chips;
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); setTimeout(()=>document.getElementById('modalText').focus(),100); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.getElementById('modalText').value=''; }
function confirmModal() {
  const cat = document.getElementById('modalCategory').value;
  const text = document.getElementById('modalText').value.trim();
  if (!text) { document.getElementById('modalText').focus(); return; }
  const emptyIdx = state.tasks[cat].findIndex(t => !t.text);
  if (emptyIdx !== -1) { state.tasks[cat][emptyIdx].text = text; } else { state.tasks[cat].push({id:cat+'_'+Date.now(),text,done:false}); }
  refreshCol(cat); renderStats(); closeModal();
  showToast(`Task aggiunto in "${COLS.find(c=>c.id===cat)?.label}"`);
}

function clearCompleted() {
  let count = 0;
  COLS.forEach(col => { const b = state.tasks[col.id].length; state.tasks[col.id] = state.tasks[col.id].filter(t=>!t.done); count += b - state.tasks[col.id].length; refreshCol(col.id); });
  renderStats();
  showToast(count > 0 ? `${count} task rimoss${count===1?'o':'i'}` : 'Nessun task completato');
}

function exportData() {
  const blob = new Blob([JSON.stringify({weekNum:document.getElementById('weekNum').value,dateFrom:document.getElementById('dateFrom').value,dateTo:document.getElementById('dateTo').value,notes:state.notes,tasks:state.tasks,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `frugal-planner-w${document.getElementById('weekNum').value}-2026.json`; a.click();
  showToast('Dati esportati in JSON');
}

function showToast(msg) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  root.setAttribute('data-theme',d);
  function icon() { if(!btn)return; btn.innerHTML = d==='dark'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'; }
  icon();
  btn&&btn.addEventListener('click',()=>{ d=d==='dark'?'light':'dark'; root.setAttribute('data-theme',d); icon(); });
})();

init();
</script>
</body>
</html>
