<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frugal Planner 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --trans:180ms cubic-bezier(.16,1,.3,1);
  --font-body:'Inter',sans-serif;--font-display:'Instrument Serif',Georgia,serif;
  --bg:#f7f6f2;--surface:#f9f8f5;--surface2:#fbfbf9;--surface-off:#f0ede8;
  --divider:#dcd9d5;--border:#d4d1ca;
  --text:#28251d;--muted:#6b6960;--faint:#aaa9a4;
  --primary:#01696f;--primary-h:#0c4e54;--primary-hl:#cedcd8;
  --sh-sm:0 1px 2px oklch(.2 .01 80/.06);--sh-md:0 4px 12px oklch(.2 .01 80/.08);--sh-lg:0 12px 32px oklch(.2 .01 80/.12);
  --urgent:#c0392b;--urgent-bg:#fdf2f1;--urgent-bd:#e8c3bf;
  --prog:#b7860b;--prog-bg:#fefbf0;--prog-bd:#e8ddb0;
  --fast:#27ae60;--fast-bg:#f0fdf5;--fast-bd:#b6e8c8;
  --week:#2471a3;--week-bg:#f0f6fd;--week-bd:#b3d4f0;
  --plan:#8e44ad;--plan-bg:#f8f3fd;--plan-bd:#d8b8f0;
  --wait:#5d4037;--wait-bg:#fdf8f5;--wait-bd:#d4bfb0;
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--surface-off:#252421;
  --divider:#2e2d2b;--border:#393836;--text:#cdccca;--muted:#7a7976;--faint:#545250;
  --primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#1e3b3e;
  --sh-sm:0 1px 2px oklch(0 0 0/.25);--sh-md:0 4px 12px oklch(0 0 0/.35);--sh-lg:0 12px 32px oklch(0 0 0/.45);
  --urgent:#e57373;--urgent-bg:#2a1a1a;--urgent-bd:#5a2d2d;
  --prog:#f0c040;--prog-bg:#252010;--prog-bd:#5a4a10;
  --fast:#66bb6a;--fast-bg:#152218;--fast-bd:#245530;
  --week:#5b9bd5;--week-bg:#0f1e30;--week-bd:#1e4060;
  --plan:#ba7fe0;--plan-bg:#1e1030;--plan-bd:#4a2560;
  --wait:#a1887f;--wait-bg:#221815;--wait-bd:#4a3328;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--text);background:var(--bg);transition:background var(--trans),color var(--trans)}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,textarea,select{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--radius-sm)}
.app{display:flex;flex-direction:column;min-height:100dvh}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-6);background:var(--surface);border-bottom:1px solid var(--divider);box-shadow:var(--sh-sm);gap:var(--space-4)}
.brand{display:flex;align-items:center;gap:var(--space-3)}
.logo{width:32px;height:32px;flex-shrink:0}
.title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;letter-spacing:-.01em;white-space:nowrap}
.title span{color:var(--primary)}
.meta{display:flex;align-items:center;gap:var(--space-4);flex:1;justify-content:center;flex-wrap:wrap}
.wk{display:flex;align-items:center;gap:var(--space-2)}
.wk-lbl{font-size:var(--text-xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.wk-inp{width:48px;padding:var(--space-1) var(--space-2);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:var(--text-sm);font-weight:600;text-align:center;transition:border-color var(--trans)}
.wk-inp:focus{border-color:var(--primary)}
.dr{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--muted)}
.di{padding:var(--space-1) var(--space-2);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:var(--text-xs);transition:border-color var(--trans)}
.di:focus{border-color:var(--primary)}
.actions{display:flex;align-items:center;gap:var(--space-2)}
.btn-ico{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--muted);transition:background var(--trans),color var(--trans)}
.btn-ico:hover{background:var(--surface-off);color:var(--text)}
.btn-p{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);background:var(--primary);color:#fff;border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:600;letter-spacing:.02em;transition:background var(--trans);white-space:nowrap}
.btn-p:hover{background:var(--primary-h)}
.save-status{font-size:var(--text-xs);color:var(--muted);display:flex;align-items:center;gap:var(--space-1);white-space:nowrap}
.save-dot{width:6px;height:6px;border-radius:var(--radius-full);background:var(--faint);transition:background .3s}
.save-dot.saving{background:#f0c040}.save-dot.saved{background:var(--fast)}.save-dot.error{background:var(--urgent)}
.stats{display:flex;gap:var(--space-4);padding:var(--space-4) var(--space-6);background:var(--surface2);border-bottom:1px solid var(--divider);overflow-x:auto;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);background:var(--surface);border:1px solid var(--border);font-size:var(--text-xs);white-space:nowrap;box-shadow:var(--sh-sm)}
.dot{width:8px;height:8px;border-radius:var(--radius-full);flex-shrink:0}
.chip-lbl{color:var(--muted);font-weight:500}
.chip-n{font-weight:700;margin-left:var(--space-1)}
.prog-wrap{flex:1;min-width:160px;display:flex;align-items:center;gap:var(--space-3);margin-left:auto}
.prog-lbl{font-size:var(--text-xs);color:var(--muted);white-space:nowrap}
.prog-track{flex:1;height:6px;background:var(--surface-off);border-radius:var(--radius-full);overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:var(--radius-full);transition:width .5s cubic-bezier(.16,1,.3,1)}
.prog-pct{font-size:var(--text-xs);font-weight:700;color:var(--primary);min-width:32px;text-align:right}
.main{padding:var(--space-6);flex:1}
.grid{display:grid;grid-template-columns:repeat(3,1fr) 200px;grid-template-rows:auto auto;gap:var(--space-4);max-width:1400px;margin:0 auto}
.col{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--sh-sm);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);transition:box-shadow var(--trans)}
.col:hover{box-shadow:var(--sh-md)}
.col-hd{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);border-bottom:1px solid}
.badge{display:inline-flex;align-items:center;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff}
.col-sub{display:block;font-size:var(--text-xs);color:var(--muted);padding:0 var(--space-4) var(--space-2);font-style:italic;border-bottom:1px solid var(--divider);background:var(--surface2)}
.col-cnt{font-size:var(--text-xs);font-weight:600;color:var(--faint);min-width:20px;text-align:right}
.col-urgent .col-hd{background:var(--urgent-bg);border-color:var(--urgent-bd)}.col-urgent .badge{background:var(--urgent)}.col-urgent .col-sub{background:var(--urgent-bg)}
.col-inprogress .col-hd{background:var(--prog-bg);border-color:var(--prog-bd)}.col-inprogress .badge{background:var(--prog)}.col-inprogress .col-sub{background:var(--prog-bg)}
.col-fast .col-hd{background:var(--fast-bg);border-color:var(--fast-bd)}.col-fast .badge{background:var(--fast)}.col-fast .col-sub{background:var(--fast-bg)}
.col-week .col-hd{background:var(--week-bg);border-color:var(--week-bd)}.col-week .badge{background:var(--week)}.col-week .col-sub{background:var(--week-bg)}
.col-plan .col-hd{background:var(--plan-bg);border-color:var(--plan-bd)}.col-plan .badge{background:var(--plan)}.col-plan .col-sub{background:var(--plan-bg)}
.col-waiting .col-hd{background:var(--wait-bg);border-color:var(--wait-bd)}.col-waiting .badge{background:var(--wait)}.col-waiting .col-sub{background:var(--wait-bg)}
.tlist{flex:1;padding:var(--space-2) 0}
.titem{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-bottom:1px solid transparent;transition:background var(--trans);min-height:40px}
.titem:last-child{border-bottom:none}
.titem:hover{background:var(--surface-off)}
.tnum{font-size:var(--text-xs);color:var(--faint);font-weight:500;min-width:16px;text-align:right;flex-shrink:0}
.tinp-wrap{flex:1}
.tinp{width:100%;background:none;border:none;outline:none;font-size:var(--text-xs);color:var(--text);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);transition:background var(--trans)}
.tinp::placeholder{color:var(--faint)}
.tinp:focus{background:var(--surface-off)}
.tinp.done{text-decoration:line-through;color:var(--faint)}
.tcheck{width:16px;height:16px;flex-shrink:0;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--trans);position:relative}
.tcheck:hover{border-color:var(--primary)}
.tcheck.checked{background:var(--primary);border-color:var(--primary)}
.tcheck.checked::after{content:'';position:absolute;width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.tdel{width:20px;height:20px;flex-shrink:0;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--faint);opacity:0;transition:opacity var(--trans),color var(--trans);font-size:14px}
.titem:hover .tdel{opacity:1}
.tdel:hover{color:var(--urgent)}
.add-row{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-top:1px solid var(--divider)}
.add-btn{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--faint);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);width:100%;transition:color var(--trans),background var(--trans)}
.add-btn:hover{color:var(--primary);background:var(--surface-off)}
.col-note{grid-row:1/3;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--sh-sm);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border)}
.col-note .col-hd{background:var(--surface-off);border-color:var(--divider)}
.col-note .badge{background:var(--muted)}
.note-area{flex:1;padding:var(--space-4);resize:none;width:100%;background:none;border:none;outline:none;font-size:var(--text-xs);color:var(--text);line-height:1.7}
.note-area::placeholder{color:var(--faint)}
.hist-panel{position:fixed;top:0;right:0;height:100dvh;width:300px;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--sh-lg);z-index:150;display:flex;flex-direction:column;transform:translateX(100%);transition:transform var(--trans)}
.hist-panel.open{transform:translateX(0)}
.hist-hd{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--divider)}
.hist-title{font-family:var(--font-display);font-size:var(--text-lg)}
.hist-list{flex:1;overflow-y:auto;padding:var(--space-3)}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);cursor:pointer;transition:background var(--trans);border:1px solid transparent;margin-bottom:var(--space-2)}
.hist-item:hover{background:var(--surface-off);border-color:var(--border)}
.hist-item.active{background:var(--primary-hl);border-color:var(--primary)}
.hist-wk{font-weight:700;font-size:var(--text-sm)}
.hist-dates{font-size:var(--text-xs);color:var(--muted)}
.hist-del{color:var(--faint);font-size:12px;padding:2px 6px;border-radius:var(--radius-sm);transition:color var(--trans),background var(--trans)}
.hist-del:hover{color:var(--urgent);background:var(--urgent-bg)}
.hist-empty{padding:var(--space-8) var(--space-4);text-align:center;color:var(--muted);font-size:var(--text-xs)}
.overlay{position:fixed;inset:0;background:oklch(.1 0 0/.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--trans)}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--sh-lg);padding:var(--space-8);width:min(480px,90vw);transform:translateY(12px) scale(.97);transition:transform var(--trans);border:1px solid var(--border)}
.overlay.open .modal{transform:translateY(0) scale(1)}
.modal-title{font-family:var(--font-display);font-size:var(--text-lg);margin-bottom:var(--space-6)}
.mf{margin-bottom:var(--space-4)}
.ml{display:block;font-size:var(--text-xs);font-weight:600;color:var(--muted);margin-bottom:var(--space-2);text-transform:uppercase;letter-spacing:.05em}
.mi,.ms{width:100%;padding:var(--space-3) var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface2);font-size:var(--text-sm);transition:border-color var(--trans)}
.mi:focus,.ms:focus{outline:none;border-color:var(--primary)}
.mact{display:flex;gap:var(--space-3);justify-content:flex-end;margin-top:var(--space-6)}
.btn-g{padding:var(--space-2) var(--space-4);font-size:var(--text-sm);border-radius:var(--radius-md);color:var(--muted);transition:background var(--trans),color var(--trans)}
.btn-g:hover{background:var(--surface-off);color:var(--text)}
.toasts{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:300;display:flex;flex-direction:column;gap:var(--space-2)}
.toast{background:var(--text);color:var(--bg);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:500;box-shadow:var(--sh-lg);animation:tin .3s cubic-bezier(.16,1,.3,1) forwards}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loading{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:var(--space-4);transition:opacity .4s}
.loading.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr) 180px;grid-template-rows:auto auto auto}.col-note{grid-row:1/4}}
@media(max-width:768px){.grid{grid-template-columns:1fr;grid-template-rows:unset}.col-note{grid-row:auto}.meta{display:none}.main{padding:var(--space-4)}.stats{padding:var(--space-3) var(--space-4)}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
</style>
</head>
<body>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <span style="font-size:var(--text-xs);color:var(--muted)">Caricamento settimana...</span>
</div>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" fill="none" aria-label="Frugal Planner">
        <rect x="2" y="2" width="28" height="28" rx="6" fill="var(--primary)" opacity=".15"/>
        <rect x="5" y="8" width="14" height="2.5" rx="1.25" fill="var(--primary)"/>
        <rect x="5" y="13" width="10" height="2" rx="1" fill="var(--primary)" opacity=".7"/>
        <rect x="5" y="18" width="12" height="2" rx="1" fill="var(--primary)" opacity=".5"/>
        <circle cx="24" cy="22" r="6" fill="var(--primary)"/>
        <path d="M21.5 22l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="title">Frugal <span>Planner</span> <span style="font-family:var(--font-body);font-size:var(--text-xs);color:var(--muted);font-weight:600">2026</span></span>
    </div>
    <div class="meta">
      <div class="wk">
        <span class="wk-lbl">Week</span>
        <input class="wk-inp" type="number" id="weekNum" min="1" max="53" value="17" aria-label="Settimana">
      </div>
      <div class="dr">
        <span style="color:var(--faint)">Dal</span>
        <input class="di" type="date" id="dateFrom" aria-label="Data inizio">
        <span style="color:var(--faint)">Al</span>
        <input class="di" type="date" id="dateTo" aria-label="Data fine">
      </div>
    </div>
    <div class="actions">
      <div class="save-status">
        <div class="save-dot" id="saveDot"></div>
        <span id="saveLabel">–</span>
      </div>
      <button class="btn-p" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Nuovo Task
      </button>
      <button class="btn-ico" onclick="toggleHist()" title="Storico settimane" aria-label="Storico settimane">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="btn-ico" data-theme-toggle aria-label="Cambia tema">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="btn-ico" onclick="clearCompleted()" title="Rimuovi completati" aria-label="Rimuovi completati">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  </header>
  <div class="stats" id="statsBar"></div>
  <main class="main">
    <div class="grid" id="grid"></div>
  </main>
</div>
<div class="hist-panel" id="histPanel" aria-label="Storico settimane">
  <div class="hist-hd">
    <span class="hist-title">Settimane</span>
    <button class="btn-ico" onclick="toggleHist()" aria-label="Chiudi">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="hist-list" id="histList"></div>
</div>
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <h2 class="modal-title">Aggiungi Task</h2>
    <div class="mf">
      <label class="ml" for="mCat">Categoria</label>
      <select class="ms" id="mCat">
        <option value="urgent">🔴 Urgent Task</option>
        <option value="inprogress">🟡 Task in Progress</option>
        <option value="fast">🟢 Fast Task</option>
        <option value="week">🔵 Week Task</option>
        <option value="plan">🟣 Plan Task</option>
        <option value="waiting">🟤 Waiting Task</option>
      </select>
    </div>
    <div class="mf">
      <label class="ml" for="mTxt">Descrizione</label>
      <input class="mi" type="text" id="mTxt" placeholder="Inserisci il task..." autocomplete="off">
    </div>
    <div class="mact">
      <button class="btn-g" onclick="closeModal()">Annulla</button>
      <button class="btn-p" onclick="confirmModal()">Aggiungi</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts" aria-live="polite"></div>
<script>
const API = 'REPLACE_WITH_YOUR_WORKER_URL';
const COLS = [
  {id:'urgent',    label:'Urgent Task',     sub:'Scadenza oggi / fare subito'},
  {id:'inprogress',label:'Task in Progress',sub:'Alta priorità e importanza max 2-3 gg'},
  {id:'fast',      label:'Fast Task',       sub:'Da fare in meno di 2h o max 30 min'},
  {id:'week',      label:'Week Task',       sub:'Da completare in 5-7 gg'},
  {id:'plan',      label:'Plan Task',       sub:'Pianificate, da completare nel mese'},
  {id:'waiting',   label:'Waiting Task',    sub:'In attesa, sospesi, fermi, con problemi'},
];
let state={weekKey:'',weekNum:17,dateFrom:'',dateTo:'',notes:'',tasks:{}};
let saveTimer=null,histOpen=false;
function init(){
  const today=new Date();
  const dow=today.getDay()||7;
  const mon=new Date(today);mon.setDate(today.getDate()-dow+1);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const wn=getWeekNum(today);
  const year=today.getFullYear();
  const wKey=`${year}-W${String(wn).padStart(2,'0')}`;
  document.getElementById('weekNum').value=wn;
  document.getElementById('dateFrom').value=mon.toISOString().split('T')[0];
  document.getElementById('dateTo').value=sun.toISOString().split('T')[0];
  state.weekKey=wKey;state.weekNum=wn;
  state.dateFrom=document.getElementById('dateFrom').value;
  state.dateTo=document.getElementById('dateTo').value;
  COLS.forEach(c=>{state.tasks[c.id]=mkEmptyTasks(c.id);});
  document.getElementById('weekNum').addEventListener('change',e=>{state.weekNum=+e.target.value;scheduleSave();});
  document.getElementById('dateFrom').addEventListener('change',e=>{state.dateFrom=e.target.value;scheduleSave();});
  document.getElementById('dateTo').addEventListener('change',e=>{state.dateTo=e.target.value;scheduleSave();});
  document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  document.getElementById('mTxt').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();});
  loadWeek(wKey);
}
function getWeekNum(d){
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);
  const y1=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-y1)/86400000)+1)/7);
}
function mkEmptyTasks(catId){
  return Array(10).fill(null).map((_,i)=>({id:`${catId}_${i}_${Date.now()}`,category:catId,text:'',done:false}));
}
async function loadWeek(weekKey){
  setStatus('saving','Caricamento...');
  try{
    const r=await fetch(`${API}/api/week/${encodeURIComponent(weekKey)}`);
    if(!r.ok)throw new Error('fetch error');
    const data=await r.json();
    if(data.week){
      state.weekNum=data.week.week_num||state.weekNum;
      state.dateFrom=data.week.date_from||state.dateFrom;
      state.dateTo=data.week.date_to||state.dateTo;
      state.notes=data.week.notes||'';
      document.getElementById('weekNum').value=state.weekNum;
      document.getElementById('dateFrom').value=state.dateFrom;
      document.getElementById('dateTo').value=state.dateTo;
    }
    COLS.forEach(c=>{state.tasks[c.id]=[];});
    if(data.tasks&&data.tasks.length>0){
      data.tasks.forEach(t=>{
        if(!state.tasks[t.category])state.tasks[t.category]=[];
        state.tasks[t.category].push({id:t.id,category:t.category,text:t.text||'',done:!!t.done});
      });
    }
    COLS.forEach(c=>{
      while(state.tasks[c.id].length<10){
        state.tasks[c.id].push({id:`${c.id}_new_${Date.now()}_${Math.random()}`,category:c.id,text:'',done:false});
      }
    });
    setStatus('saved','Salvato');
  }catch(e){
    setStatus('error','Errore connessione');
    toast('⚠️ Configura API in index.html con il tuo Worker URL');
  }
  renderGrid();renderStats();hideLoading();
}
async function saveWeek(){
  setStatus('saving','Salvataggio...');
  const tasks=[];
  COLS.forEach(c=>{state.tasks[c.id].forEach((t,i)=>{if(t.text)tasks.push({...t,position:i});});});
  try{
    const r=await fetch(`${API}/api/week/${encodeURIComponent(state.weekKey)}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({weekNum:state.weekNum,dateFrom:state.dateFrom,dateTo:state.dateTo,notes:state.notes,tasks})
    });
    if(!r.ok)throw new Error();
    setStatus('saved','Salvato ✓');loadHistList();
  }catch(e){setStatus('error','Errore salvataggio');toast('❌ Salvataggio fallito');}
}
async function loadHistList(){
  try{
    const r=await fetch(`${API}/api/weeks`);
    const data=await r.json();
    renderHistList(data.weeks||[]);
  }catch(e){renderHistList([]);}
}
async function deleteWeek(weekKey,e){
  e.stopPropagation();
  if(!confirm(`Eliminare i dati di ${weekKey}?`))return;
  await fetch(`${API}/api/week/${encodeURIComponent(weekKey)}`,{method:'DELETE'});
  loadHistList();toast(`Settimana ${weekKey} eliminata`);
}
function scheduleSave(){clearTimeout(saveTimer);setStatus('saving','...');saveTimer=setTimeout(saveWeek,1200);}
function setStatus(type,msg){document.getElementById('saveDot').className='save-dot '+type;document.getElementById('saveLabel').textContent=msg;}
function hideLoading(){const el=document.getElementById('loading');el.classList.add('hidden');setTimeout(()=>el.style.display='none',500);}
function renderGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  COLS.forEach(c=>grid.appendChild(mkCol(c)));
  const note=document.createElement('div');
  note.className='col col-note';
  note.innerHTML=`<div class="col-hd"><div><span class="badge">NOTE</span></div></div><textarea class="note-area" id="noteArea" placeholder="Appunti liberi per questa settimana...">${esc(state.notes)}</textarea>`;
  grid.appendChild(note);
  document.getElementById('noteArea').addEventListener('input',e=>{state.notes=e.target.value;scheduleSave();});
}
function mkCol(col){
  const w=document.createElement('div');
  w.className=`col col-${col.id}`;w.id=`col-${col.id}`;
  const tasks=state.tasks[col.id]||[];
  const done=tasks.filter(t=>t.done&&t.text).length;
  const total=tasks.filter(t=>t.text).length;
  w.innerHTML=`<div class="col-hd"><div><span class="badge">${col.label}</span></div><span class="col-cnt">${done}/${total}</span></div><span class="col-sub">${col.sub}</span><div class="tlist" id="list-${col.id}">${tasks.map((t,i)=>mkTask(col.id,t,i)).join('')}</div><div class="add-row"><button class="add-btn" onclick="addSlot('${col.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Aggiungi task</button></div>`;
  return w;
}
function mkTask(colId,t,i){
  return `<div class="titem" id="ti-${t.id}"><span class="tnum">${i+1}</span><div class="tinp-wrap"><input class="tinp${t.done?' done':''}" type="text" value="${esc(t.text)}" placeholder="Task ${i+1}..." onchange="updTask('${colId}','${t.id}',this.value)" onkeydown="tkdown(event,'${colId}','${t.id}')" aria-label="Task ${i+1}"></div><div class="tcheck${t.done?' checked':''}" onclick="togTask('${colId}','${t.id}')" role="checkbox" aria-checked="${t.done}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')togTask('${colId}','${t.id}')"></div><button class="tdel" onclick="delTask('${colId}','${t.id}')" aria-label="Elimina">&times;</button></div>`;
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updTask(colId,id,val){const t=state.tasks[colId].find(x=>x.id===id);if(t)t.text=val;refreshHdr(colId);renderStats();scheduleSave();}
function togTask(colId,id){
  const t=state.tasks[colId].find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  const el=document.getElementById(`ti-${id}`);
  if(el){el.querySelector('.tcheck').classList.toggle('checked',t.done);el.querySelector('.tcheck').setAttribute('aria-checked',t.done);el.querySelector('.tinp').classList.toggle('done',t.done);}
  refreshHdr(colId);renderStats();scheduleSave();
  if(t.done&&t.text)toast('✓ Task completato');
}
function delTask(colId,id){const idx=state.tasks[colId].findIndex(x=>x.id===id);if(idx!==-1)state.tasks[colId].splice(idx,1);refreshCol(colId);renderStats();scheduleSave();}
function addSlot(colId){
  state.tasks[colId].push({id:`${colId}_${Date.now()}`,category:colId,text:'',done:false});
  refreshCol(colId);
  setTimeout(()=>{const ins=document.querySelectorAll(`#list-${colId} .tinp`);if(ins.length)ins[ins.length-1].focus();},50);
}
function tkdown(e,colId){if(e.key==='Enter'){e.preventDefault();addSlot(colId);}}
function refreshCol(colId){const col=COLS.find(c=>c.id===colId);const el=document.getElementById(`col-${colId}`);if(col&&el)el.replaceWith(mkCol(col));}
function refreshHdr(colId){const tasks=state.tasks[colId];const el=document.querySelector(`#col-${colId} .col-cnt`);if(el)el.textContent=`${tasks.filter(t=>t.done&&t.text).length}/${tasks.filter(t=>t.text).length}`;}
function renderStats(){
  const C={urgent:'var(--urgent)',inprogress:'var(--prog)',fast:'var(--fast)',week:'var(--week)',plan:'var(--plan)',waiting:'var(--wait)'};
  const L={urgent:'Urgent',inprogress:'In Progress',fast:'Fast',week:'Week',plan:'Plan',waiting:'Waiting'};
  let tot=0,don=0,chips='';
  COLS.forEach(c=>{const f=state.tasks[c.id].filter(t=>t.text);const d=f.filter(t=>t.done);tot+=f.length;don+=d.length;chips+=`<div class="chip"><span class="dot" style="background:${C[c.id]}"></span><span class="chip-lbl">${L[c.id]}</span><span class="chip-n" style="color:${C[c.id]}">${d.length}/${f.length}</span></div>`;});
  const pct=tot>0?Math.round((don/tot)*100):0;
  chips+=`<div class="prog-wrap"><span class="prog-lbl">Completamento settimanale</span><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-pct">${pct}%</span></div>`;
  document.getElementById('statsBar').innerHTML=chips;
}
function toggleHist(){histOpen=!histOpen;document.getElementById('histPanel').classList.toggle('open',histOpen);if(histOpen)loadHistList();}
function renderHistList(weeks){
  const el=document.getElementById('histList');
  if(!weeks.length){el.innerHTML='<div class="hist-empty">Nessuna settimana salvata</div>';return;}
  el.innerHTML=weeks.map(w=>`<div class="hist-item${w.week_key===state.weekKey?' active':''}" onclick="switchWeek('${w.week_key}')"><div><div class="hist-wk">${w.week_key}</div><div class="hist-dates">${w.date_from||''} → ${w.date_to||''}</div></div><button class="hist-del" onclick="deleteWeek('${w.week_key}',event)" aria-label="Elimina settimana">✕</button></div>`).join('');
}
function switchWeek(weekKey){
  if(weekKey===state.weekKey)return;
  state.weekKey=weekKey;
  document.getElementById('loading').style.display='flex';
  document.getElementById('loading').classList.remove('hidden');
  COLS.forEach(c=>{state.tasks[c.id]=mkEmptyTasks(c.id);});
  loadWeek(weekKey);histOpen=false;
  document.getElementById('histPanel').classList.remove('open');
}
function openModal(){document.getElementById('overlay').classList.add('open');setTimeout(()=>document.getElementById('mTxt').focus(),100);}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.getElementById('mTxt').value='';}
function confirmModal(){
  const cat=document.getElementById('mCat').value;
  const txt=document.getElementById('mTxt').value.trim();
  if(!txt){document.getElementById('mTxt').focus();return;}
  const ei=state.tasks[cat].findIndex(t=>!t.text);
  if(ei!==-1)state.tasks[cat][ei].text=txt;
  else state.tasks[cat].push({id:`${cat}_${Date.now()}`,category:cat,text:txt,done:false});
  refreshCol(cat);renderStats();scheduleSave();closeModal();
  toast(`Task aggiunto in "${COLS.find(c=>c.id===cat)?.label}"`);
}
function clearCompleted(){
  let n=0;
  COLS.forEach(c=>{const b=state.tasks[c.id].length;state.tasks[c.id]=state.tasks[c.id].filter(t=>!t.done);n+=b-state.tasks[c.id].length;refreshCol(c.id);});
  renderStats();scheduleSave();
  toast(n>0?`${n} task rimoss${n===1?'o':'i'}`:'Nessun task completato');
}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3500);}
(function(){
  const btn=document.querySelector('[data-theme-toggle]');
  const root=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  root.setAttribute('data-theme',d);
  function ico(){if(!btn)return;btn.innerHTML=d==='dark'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';}
  ico();
  btn&&btn.addEventListener('click',()=>{d=d==='dark'?'light':'dark';root.setAttribute('data-theme',d);ico();});
})();
init();
</script>
</body>
</html>
